
<div class="card">
  <h2>IA Logística</h2>
  <button onclick="carregarIA()">Atualizar análise</button>
  <div id="iaLista" class="list"></div>
</div>

<script>
async function carregarIA(){
  const r = await fetch('/api/ia/resumo');
  const data = await r.json();
  document.getElementById('iaLista').innerHTML = (data.sugestoes || []).map(s => `<div class="item">${s}</div>`).join('') || '<div class="item">Sem sugestões.</div>';
}
carregarIA();
</script>
