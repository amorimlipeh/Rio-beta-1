
<div class="card">
  <h2>Separação (Picking)</h2>
  <div id="listaPedidos"></div>
</div>

<script>
  async function carregarPedidos(){
    const res = await fetch('/api/picking/pedidos-abertos');
    const pedidos = await res.json();
    const el = document.getElementById('listaPedidos');
    el.innerHTML = '';
    pedidos.forEach(p => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <b>${p.id}</b> - ${p.cliente}<br>
        Status: ${p.status}<br>
        <button onclick="iniciar('${p.id}')">Iniciar separação</button>
      `;
      el.appendChild(div);
    });
  }

  async function iniciar(id){
    await fetch('/api/picking/iniciar/' + id, { method: 'POST' });
    alert('Separação iniciada');
    carregarPedidos();
  }

  async function confirmar(){
    const produto = prompt('Código do produto:');
    const quantidade = prompt('Quantidade:');
    if(!produto || !quantidade) return;
    await fetch('/api/picking/confirmar', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ produto, quantidade })
    });
    alert('Baixa realizada');
  }

  carregarPedidos();
</script>
