<div class="card">
  <h2>Separação do Operador</h2>
  <div class="text-muted">Tela principal do operador, com scanner integrado e fila de picking.</div>

  <div class="row">
    <button onclick="SeparacaoUI.carregar()">Atualizar fila</button>
  </div>

  <div class="subcard">
    <h3>Próximo picking</h3>
    <div id="sepProximo" class="list"></div>
  </div>

  <div class="subcard">
    <h3>Scanner integrado</h3>
    <div class="status-line" id="scanStatus">Scanner parado.</div>

    <div class="scanner-box">
      <video id="scanVideo" autoplay playsinline muted></video>
      <canvas id="scanCanvas" class="hidden"></canvas>
      <div class="scan-area"></div>
    </div>

    <div class="scan-actions">
      <button class="icon-btn" onclick="SeparacaoScanner.trocarCamera()" title="Trocar câmera">🔄</button>
      <button class="capture-btn" onclick="SeparacaoScanner.botaoPrincipal()" title="Iniciar ou capturar">●</button>
      <button class="icon-btn" onclick="SeparacaoScanner.parar()" title="Parar">✕</button>
    </div>

    <div class="row hidden" id="scanCamBox">
      <select id="scanLista"></select>
    </div>

    <div class="row">
      <input id="scanManual" placeholder="Código manual" />
      <button onclick="SeparacaoScanner.validarManual()">Validar código</button>
    </div>

    <div class="list" id="scanResultado"></div>
  </div>

  <div class="subcard">
    <h3>Fila de separação</h3>
    <div class="list" id="sepLista"></div>
  </div>
</div>

<script src="/js/voz.js"></script>
<script src="/js/separacao-ui.js"></script>
<script src="/js/separacao-scanner.js"></script>
