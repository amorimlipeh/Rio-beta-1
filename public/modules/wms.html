
<div class="card">
  <h2>WMS</h2>
  <div id="wms-grid" class="wms-grid"></div>
</div>

<script>
(async function(){
  const el = document.getElementById('wms-grid');
  try{
    const r = await fetch('/data/wms-avancado.json', { cache: 'no-store' });
    const list = await r.json();
    el.innerHTML = (list || []).slice(0, 24).map(x => `
      <div class="wms-cell">
        <strong>${x.endereco}</strong>
        <div>Status: ${x.status}</div>
        <div>${x.produto || '-'}</div>
      </div>
    `).join('') || '<div class="item">Sem endereços WMS.</div>';
  }catch(e){
    el.innerHTML = '<div class="item">Falha ao carregar WMS.</div>';
  }
})();
</script>
