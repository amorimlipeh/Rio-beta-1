<div class="card">
  <h2>Scanner Real V6</h2>

  <select id="listaCameras" style="width:100%;margin-bottom:10px;"></select>

  <button onclick="usarCameraSelecionada()">Usar câmera selecionada</button>

  <button onclick="iniciarCamera()">Iniciar câmera traseira</button>
  <button onclick="pararCamera()">Parar câmera</button>

  <input id="codigoManual" placeholder="Código manual" />
  <button onclick="alert('Validar depois')">Validar código</button>

  <p id="status"></p>

  <h3>Pré-visualização</h3>
  <video id="video" autoplay playsinline style="width:100%;border-radius:10px;"></video>

  <h3>Resultado atual</h3>
  <div id="resultado"></div>

  <h3>Histórico</h3>
  <div id="historico"></div>
</div>

<script src="/js/v6-scanner.js"></script>
