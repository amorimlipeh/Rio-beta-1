<section id="scanner-base" class="module hidden">
  <div class="card">
    <h2>Scanner Base</h2>
    <div class="row">
      <input id="scannerCodigo" placeholder="Digite / cole o código lido" />
      <input id="scannerResultado" placeholder="Resultado" readonly />
    </div>
    <button onclick="RIOScanner.validar()">Validar código</button>
    <button onclick="RIOScanner.limpar()">Limpar</button>
    <div id="scannerMsg" class="msg"></div>
    <div class="subcard">
      <h3>Últimos códigos</h3>
      <div id="scannerHistorico" class="list compact"></div>
    </div>
  </div>
</section>
