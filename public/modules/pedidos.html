<div class="card">
  <h2>Pedidos</h2>

  <div class="subcard">
    <h3>Novo pedido</h3>

    <div class="row">
      <input id="pedNumero" placeholder="Número do pedido (opcional)" />
      <input id="pedCliente" placeholder="Cliente" />
      <input id="pedProdutoBusca" placeholder="Digite código ou nome do produto" oninput="PedidosUI.buscarProdutos()" autocomplete="off" />
      <div id="pedSugestoes" class="suggest-box hidden"></div>
      <input id="pedProdutoCodigo" placeholder="Produto selecionado" readonly />
      <input id="pedQtd" placeholder="Quantidade" />
      <button onclick="PedidosUI.salvar()">Salvar pedido</button>
    </div>

    <div id="pedMsg" style="margin-top:10px;"></div>
  </div>

  <div class="subcard">
    <h3>Lista de pedidos</h3>
    <div class="list" id="pedLista"></div>
  </div>
</div>
<script src="/js/pedidos-ui.js"></script>
