
<div class="card">
  <h2>Importação</h2>
  <div class="row">
    <input id="impArquivo" placeholder="Nome do arquivo" />
    <input id="impLinhas" placeholder="Qtd. de linhas" type="number" />
  </div>
  <input id="impObs" placeholder="Observação / layout detectado" />
  <button onclick="simularImportacao()">Gerar simulação</button>
  <div id="impMsg" class="msg"></div>

  <div class="subcard">
    <h3>Histórico de importações</h3>
    <div id="listaImportacoes" class="list"></div>
  </div>
</div>

<script>
async function carregarImportacoes(){
  const r = await fetch('/api/importacao');
  const list = await r.json();
  document.getElementById('listaImportacoes').innerHTML = list.map(i => `
    <div class="item">
      <strong>${i.nomeArquivo}</strong><br>
      Linhas: ${i.linhas} • Status: ${i.status}<br>
      ${i.observacao}<br>
      <small>${new Date(i.data).toLocaleString()}</small>
    </div>
  `).join('') || '<div class="item">Nenhuma importação.</div>';
}
async function simularImportacao(){
  await fetch('/api/importacao/simular', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      nomeArquivo: document.getElementById('impArquivo').value,
      linhas: document.getElementById('impLinhas').value,
      observacao: document.getElementById('impObs').value
    })
  });
  document.getElementById('impArquivo').value = '';
  document.getElementById('impLinhas').value = '';
  document.getElementById('impObs').value = '';
  document.getElementById('impMsg').textContent = 'Simulação de importação criada com sucesso.';
  carregarImportacoes();
}
carregarImportacoes();
</script>
