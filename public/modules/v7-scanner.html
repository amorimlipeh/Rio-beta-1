
<div class="card">
  <h2>Scanner Inteligente V7</h2>

  <div class="row">
    <button onclick="iniciarCamera()">Iniciar Scanner</button>
    <button onclick="pararCamera()">Parar</button>
  </div>

  <div class="row">
    <input id="codigoManual" placeholder="Código manual" />
    <button onclick="validarManual()">Validar código</button>
  </div>

  <p id="status"></p>

  <h3>Pré-visualização</h3>
  <video id="video" autoplay playsinline muted style="width:100%;border-radius:10px;background:#000;"></video>

  <h3>Resultado</h3>
  <div id="resultado"></div>

  <h3>Separação automática</h3>
  <div id="separacaoAuto"></div>

  <h3>Histórico</h3>
  <div id="historico"></div>
</div>

<script src="/js/v7-scanner.js"></script>
