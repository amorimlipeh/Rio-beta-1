
<div class="card">
  <h2>Contêiner / Recebimento</h2>
  <div class="row">
    <input id="ctnCodigo" placeholder="Código do contêiner" />
    <input id="ctnFornecedor" placeholder="Fornecedor" />
  </div>
  <div class="row">
    <select id="ctnStatus">
      <option value="chegou">Chegou</option>
      <option value="conferencia">Em conferência</option>
      <option value="finalizado">Finalizado</option>
    </select>
    <input id="ctnObs" placeholder="Observação" />
  </div>
  <button onclick="salvarContainer()">Salvar contêiner</button>
  <div id="ctnMsg" class="msg"></div>

  <div class="subcard">
    <h3>Lista de contêineres</h3>
    <div id="listaContainers" class="list"></div>
  </div>
</div>

<script>
async function carregarContainers(){
  const r = await fetch('/api/container');
  const list = await r.json();
  document.getElementById('listaContainers').innerHTML = list.map(c => `
    <div class="item">
      <strong>${c.codigo}</strong> - ${c.fornecedor}<br>
      Status: <strong>${c.status}</strong><br>
      ${c.observacao || '-'}<br>
      <small>${new Date(c.data).toLocaleString()}</small><br>
      <button onclick="mudarStatusContainer('${c.id}','conferencia')">Em conferência</button>
      <button onclick="mudarStatusContainer('${c.id}','finalizado')">Finalizar</button>
    </div>
  `).join('') || '<div class="item">Nenhum contêiner.</div>';
}
async function salvarContainer(){
  await fetch('/api/container', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      codigo: document.getElementById('ctnCodigo').value,
      fornecedor: document.getElementById('ctnFornecedor').value,
      status: document.getElementById('ctnStatus').value,
      observacao: document.getElementById('ctnObs').value
    })
  });
  document.getElementById('ctnCodigo').value = '';
  document.getElementById('ctnFornecedor').value = '';
  document.getElementById('ctnObs').value = '';
  document.getElementById('ctnMsg').textContent = 'Contêiner salvo com sucesso.';
  carregarContainers();
}
async function mudarStatusContainer(id, status){
  await fetch('/api/container/status/' + id, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ status })
  });
  carregarContainers();
}
carregarContainers();
</script>
