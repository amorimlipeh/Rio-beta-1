<h2>Dashboard</h2>
<div id="dados"></div>

<script>
fetch('/api/dashboard')
  .then(r => r.json())
  .then(data => {
    document.getElementById('dados').innerHTML = `
      📦 Produtos: ${data.totalProdutos}<br>
      📊 Estoque: ${data.totalEstoque}<br>
      📋 Pedidos: ${data.pedidosAbertos}
    `;
  });
</script>
